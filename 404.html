<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Meshweb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #fffdd0;
        --text: #543325;
        --accent: #8b5e3c;
        --accent2: #e8dcc6;
        --glass: rgba(255, 253, 208, 0.78);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.03;
        z-index: 1;
      }
      h1 {
        font-family: "Cormorant Garamond", Georgia, serif;
        color: var(--text);
        line-height: 1.15;
      }
      h1 {
        font-size: clamp(36px, 5vw, 64px);
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin-bottom: 12px;
        color: rgba(84, 51, 37, 0.86);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      ::selection {
        background: var(--accent);
        color: #fffdd0;
      }
      ::-moz-selection {
        background: var(--accent);
        color: #fffdd0;
      }
      .bg-gradient {
        position: fixed;
        inset: -20%;
        z-index: -2;
        opacity: 0.65;
        filter: blur(40px) saturate(1.1);
        background:
          radial-gradient(600px at 20% 30%, #f5e9c9 0%, transparent 60%),
          radial-gradient(800px at 80% 20%, #e8dcc6 0%, transparent 60%),
          radial-gradient(500px at 50% 80%, #fff8d6 0%, transparent 60%);
        animation: liquid 40s ease-in-out infinite alternate;
      }
      @keyframes liquid {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        100% {
          transform: translate3d(0, -30px, 0) scale(1.05);
        }
      }

      .glass {
        background: var(--glass);
        backdrop-filter: blur(18px) saturate(1.25);
        -webkit-backdrop-filter: blur(18px) saturate(1.25);
        border: 1px solid rgba(255, 255, 255, 0.45);
        box-shadow: 0 12px 40px rgba(84, 51, 37, 0.07);
        border-radius: var(--radius);
      }

      .cta-btn {
        background: var(--accent);
        color: #fffdd0;
        padding: 14px 32px;
        border-radius: 12px;
        font-weight: 500;
        text-decoration: none;
        font-size: 16px;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
        box-shadow: 0 6px 16px rgba(139, 94, 60, 0.18);
      }
      .cta-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 24px rgba(139, 94, 60, 0.26);
      }

      .link-ghost {
        padding: 14px 28px;
        border-radius: 12px;
        text-decoration: none;
        color: var(--text);
        border: 1px solid rgba(84, 51, 37, 0.18);
        font-weight: 500;
        font-size: 16px;
        transition: background 0.2s;
      }
      .link-ghost:hover {
        background: rgba(232, 220, 198, 0.5);
      }

      .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        z-index: 2;
        min-height: 70vh;
      }

      .container {
        max-width: 700px;
        width: 100%;
        margin: 0 auto;
      }

      .card {
        padding: 60px 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .weave-bg {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.05;
        z-index: 0;
      }

      .weave-bg svg {
        width: 100%;
        height: 100%;
      }

      .content {
        position: relative;
        z-index: 1;
      }

      .error-number {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(100px, 18vw, 160px);
        font-weight: 700;
        line-height: 1;
        color: var(--accent);
        letter-spacing: -0.04em;
        margin-bottom: 4px;
      }

      .divider {
        width: 80px;
        height: 2px;
        background: var(--accent);
        margin: 12px auto 20px;
        opacity: 0.4;
      }

      .error-title {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 600;
        color: var(--text);
        margin-bottom: 12px;
        line-height: 1.15;
      }

      .error-message {
        max-width: 440px;
        margin: 0 auto 32px;
        font-size: 17px;
        color: rgba(84, 51, 37, 0.75);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }

      footer {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 24px;
        border-top: 1px solid rgba(84, 51, 37, 0.12);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        font-size: 14px;
        color: rgba(84, 51, 37, 0.8);
        position: relative;
        z-index: 2;
        width: 100%;
      }
      footer a {
        color: var(--text);
        text-decoration: none;
        opacity: 0.8;
      }
      footer a:hover {
        opacity: 1;
        text-decoration: underline;
      }

      @media (max-width: 640px) {
        .card {
          padding: 40px 24px;
        }
        .actions {
          flex-direction: column;
          align-items: center;
        }
        .cta-btn,
        .link-ghost {
          width: 100%;
          justify-content: center;
        }
        footer {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-gradient" aria-hidden="true"></div>

    <main class="main-content">
      <div class="container">
        <div class="glass card">
          <div class="weave-bg">
            <svg viewBox="0 0 400 300" preserveAspectRatio="none">
              <path d="M0 80 Q100 40 200 80 T400 70" stroke="#8b5e3c" stroke-width="2" fill="none"/>
              <path d="M0 120 Q150 160 300 110 T400 130" stroke="#8b5e3c" stroke-width="2" fill="none"/>
              <path d="M0 180 Q80 140 200 190 T400 170" stroke="#8b5e3c" stroke-width="2" fill="none"/>
              <path d="M0 230 Q200 200 300 240 T400 220" stroke="#8b5e3c" stroke-width="2" fill="none"/>
            </svg>
          </div>

          <div class="content">
            <div class="error-number">404</div>
            <div class="divider"></div>
            <h1 class="error-title">Page not found</h1>
            <p class="error-message">
              The page you're looking for doesn't exist or has been moved. Let's get you back on track.
            </p>

            <div class="actions">
              <a href="/" class="cta-btn">← Back to home</a>
              <a href="/#contact" class="link-ghost">Contact us</a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div>
        © 2026 Meshweb ·
        <a href="mailto:contact@meshweb.co.uk">contact@meshweb.co.uk</a>
      </div>
      <div style="display: flex; gap: 18px">
        <a href="/#privacy">Privacy</a>
        <a href="/#terms">Terms</a>
        <a href="/#cookies">Cookies</a>
      </div>
    </footer>
  </body>
</html>
